<svg width="680" viewBox="0 0 680 370" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="0" y="0" width="680" height="370" rx="12" fill="#141420"/>

<rect x="60" y="28" width="300" height="240" rx="16" fill="none" stroke="#e87050" stroke-width="1" stroke-dasharray="6 3"/>
<text x="210" y="50" text-anchor="middle" font-size="12" fill="#8a8980">Pod namespace</text>

<rect x="80" y="66" width="260" height="56" rx="10" fill="#1e1e2e" stroke="#8a8980" stroke-width="0.5"/>
<text x="210" y="86" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#e0dfd8">Training pod</text>
<text x="210" y="106" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#8a8980">Running NCCL workload</text>

<rect x="100" y="142" width="100" height="44" rx="6" fill="#301812" stroke="#cc5535" stroke-width="0.5"/>
<text x="150" y="158" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#e88060">eth0</text>
<text x="150" y="176" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#cc5535">10.42.0.5</text>

<rect x="220" y="142" width="120" height="44" rx="6" fill="#28200e" stroke="#c07818" stroke-width="0.5"/>
<text x="280" y="158" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#e0a840">net1 (PF)</text>
<text x="280" y="176" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#c07818">192.168.60.2</text>

<rect x="120" y="206" width="200" height="44" rx="6" fill="#301812" stroke="#cc5535" stroke-width="0.5"/>
<text x="220" y="220" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#e88060">/dev/infiniband/uverbs0</text>
<text x="220" y="238" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#cc5535">exclusive RDMA access</text>

<rect x="430" y="28" width="200" height="240" rx="16" fill="none" stroke="#4a4940" stroke-width="0.5" stroke-dasharray="6 3"/>
<text x="530" y="50" text-anchor="middle" font-size="12" fill="#8a8980">Host namespace</text>

<rect x="450" y="90" width="160" height="56" rx="8" fill="#1e1e2e" stroke="#8a8980" stroke-width="0.5"/>
<text x="530" y="110" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#c0bfb8">Flannel / Calico</text>
<text x="530" y="130" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#8a8980">Management NIC</text>

<rect x="460" y="176" width="140" height="56" rx="8" fill="#1e1e2e" stroke="#8a8980" stroke-width="0.5"/>
<text x="530" y="196" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#c0bfb8">Training NIC</text>
<text x="530" y="216" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#8a8980">gone from host</text>

<path d="M530 232 L530 252 L370 252 L370 206" fill="none" stroke="#e87050" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="450" y="248" text-anchor="middle" font-size="12" fill="#e87050">moved into pod</text>

<text x="340" y="310" text-anchor="middle" font-size="12" fill="#8a8980">The PF physically moves between namespaces</text>
<text x="340" y="328" text-anchor="middle" font-size="12" fill="#8a8980">One pod per NIC — requires a dedicated training NIC per node</text>
<text x="340" y="356" text-anchor="middle" font-size="12" fill="#6a6960">NIC returns to host namespace when pod terminates</text>
</svg>
