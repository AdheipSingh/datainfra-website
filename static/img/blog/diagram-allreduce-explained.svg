<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680">
  <defs>
    <marker id="arrow-dark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a2e"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#28a745"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f3460"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="680" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e" text-anchor="middle">AllReduce: How Distributed Training Syncs Gradients</text>
  
  <!-- Step 1: Independent Computation -->
  <rect x="30" y="60" width="840" height="130" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="50" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f3460">Step 1: Each GPU Computes Gradients Independently</text>
  
  <!-- GPU 0 -->
  <rect x="80" y="100" width="160" height="70" rx="6" fill="#76b900" stroke="#5a8f00"/>
  <text x="160" y="125" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">GPU 0 (Server 1)</text>
  <text x="160" y="145" font-family="Arial, sans-serif" font-size="11" fill="#ddd" text-anchor="middle">Processes Batch A</text>
  <text x="160" y="162" font-family="Arial, sans-serif" font-size="10" fill="#ddd" text-anchor="middle">Gradients: [0.5, -0.3, 0.8]</text>
  
  <!-- GPU 1 -->
  <rect x="280" y="100" width="160" height="70" rx="6" fill="#76b900" stroke="#5a8f00"/>
  <text x="360" y="125" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">GPU 1 (Server 1)</text>
  <text x="360" y="145" font-family="Arial, sans-serif" font-size="11" fill="#ddd" text-anchor="middle">Processes Batch B</text>
  <text x="360" y="162" font-family="Arial, sans-serif" font-size="10" fill="#ddd" text-anchor="middle">Gradients: [0.3, -0.1, 0.4]</text>
  
  <!-- GPU 2 -->
  <rect x="480" y="100" width="160" height="70" rx="6" fill="#76b900" stroke="#5a8f00"/>
  <text x="560" y="125" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">GPU 2 (Server 2)</text>
  <text x="560" y="145" font-family="Arial, sans-serif" font-size="11" fill="#ddd" text-anchor="middle">Processes Batch C</text>
  <text x="560" y="162" font-family="Arial, sans-serif" font-size="10" fill="#ddd" text-anchor="middle">Gradients: [0.7, -0.5, 0.2]</text>
  
  <!-- GPU 3 -->
  <rect x="680" y="100" width="160" height="70" rx="6" fill="#76b900" stroke="#5a8f00"/>
  <text x="760" y="125" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">GPU 3 (Server 2)</text>
  <text x="760" y="145" font-family="Arial, sans-serif" font-size="11" fill="#ddd" text-anchor="middle">Processes Batch D</text>
  <text x="760" y="162" font-family="Arial, sans-serif" font-size="10" fill="#ddd" text-anchor="middle">Gradients: [0.1, -0.7, 0.6]</text>
  
  <!-- Arrows down from Step 1 -->
  <line x1="160" y1="170" x2="160" y2="210" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow-dark)"/>
  <line x1="360" y1="170" x2="360" y2="210" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow-dark)"/>
  <line x1="560" y1="170" x2="560" y2="210" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow-dark)"/>
  <line x1="760" y1="170" x2="760" y2="210" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow-dark)"/>
  
  <!-- Step 2: Network Transfer -->
  <rect x="30" y="220" width="840" height="180" rx="8" fill="#fff" stroke="#dc3545" stroke-width="2"/>
  <text x="50" y="245" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc3545">Step 2: AllReduce — Exchange Gradients Over Network</text>
  <text x="50" y="265" font-family="Arial, sans-serif" font-size="11" fill="#666">Every GPU sends gradients to every other GPU. This is where network bandwidth matters.</text>
  
  <!-- Network cloud -->
  <ellipse cx="450" cy="340" rx="180" ry="45" fill="#f8d7da" stroke="#dc3545" stroke-width="2"/>
  <text x="450" y="335" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#dc3545" text-anchor="middle">NETWORK</text>
  <text x="450" y="355" font-family="Arial, sans-serif" font-size="11" fill="#721c24" text-anchor="middle">AllReduce Operation</text>
  
  <!-- GPU boxes in step 2 -->
  <rect x="80" y="285" width="80" height="35" rx="4" fill="#76b900"/>
  <text x="120" y="307" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">GPU 0</text>
  
  <rect x="200" y="285" width="80" height="35" rx="4" fill="#76b900"/>
  <text x="240" y="307" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">GPU 1</text>
  
  <rect x="620" y="285" width="80" height="35" rx="4" fill="#76b900"/>
  <text x="660" y="307" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">GPU 2</text>
  
  <rect x="740" y="285" width="80" height="35" rx="4" fill="#76b900"/>
  <text x="780" y="307" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">GPU 3</text>
  
  <!-- Arrows to network -->
  <line x1="120" y1="320" x2="300" y2="340" stroke="#dc3545" stroke-width="2"/>
  <line x1="240" y1="320" x2="350" y2="335" stroke="#dc3545" stroke-width="2"/>
  <line x1="660" y1="320" x2="550" y2="335" stroke="#dc3545" stroke-width="2"/>
  <line x1="780" y1="320" x2="600" y2="340" stroke="#dc3545" stroke-width="2"/>
  
  <!-- Bottleneck callout -->
  <rect x="680" y="360" width="180" height="35" rx="4" fill="#fff3cd" stroke="#ffc107"/>
  <text x="770" y="375" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#856404" text-anchor="middle">⚠️ BOTTLENECK</text>
  <text x="770" y="388" font-family="Arial, sans-serif" font-size="8" fill="#856404" text-anchor="middle">GPUs wait here for network</text>
  
  <!-- Arrows down from Step 2 -->
  <line x1="450" y1="400" x2="450" y2="430" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow-dark)"/>
  
  <!-- Step 3: Average Computed -->
  <rect x="30" y="440" width="840" height="60" rx="8" fill="#fff" stroke="#0f3460" stroke-width="2"/>
  <text x="50" y="465" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f3460">Step 3: Compute Average</text>
  
  <text x="280" y="480" font-family="Arial, sans-serif" font-size="11" fill="#1a1a2e">([0.5, -0.3, 0.8] + [0.3, -0.1, 0.4] + [0.7, -0.5, 0.2] + [0.1, -0.7, 0.6]) ÷ 4 =</text>
  <text x="750" y="480" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f3460">[0.4, -0.4, 0.5]</text>
  
  <!-- Arrows down from Step 3 -->
  <line x1="160" y1="500" x2="160" y2="530" stroke="#28a745" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="360" y1="500" x2="360" y2="530" stroke="#28a745" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="560" y1="500" x2="560" y2="530" stroke="#28a745" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="760" y1="500" x2="760" y2="530" stroke="#28a745" stroke-width="2" marker-end="url(#arrow-green)"/>
  
  <!-- Step 4: All GPUs Have Same Result -->
  <rect x="30" y="540" width="840" height="120" rx="8" fill="#fff" stroke="#28a745" stroke-width="2"/>
  <text x="50" y="565" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#28a745">Step 4: Every GPU Gets the Same Averaged Gradients</text>
  
  <!-- Final GPU states -->
  <rect x="80" y="580" width="160" height="50" rx="6" fill="#28a745" stroke="#1e7e34"/>
  <text x="160" y="602" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">GPU 0</text>
  <text x="160" y="620" font-family="Arial, sans-serif" font-size="10" fill="#ddd" text-anchor="middle">[0.4, -0.4, 0.5] ✓</text>
  
  <rect x="280" y="580" width="160" height="50" rx="6" fill="#28a745" stroke="#1e7e34"/>
  <text x="360" y="602" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">GPU 1</text>
  <text x="360" y="620" font-family="Arial, sans-serif" font-size="10" fill="#ddd" text-anchor="middle">[0.4, -0.4, 0.5] ✓</text>
  
  <rect x="480" y="580" width="160" height="50" rx="6" fill="#28a745" stroke="#1e7e34"/>
  <text x="560" y="602" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">GPU 2</text>
  <text x="560" y="620" font-family="Arial, sans-serif" font-size="10" fill="#ddd" text-anchor="middle">[0.4, -0.4, 0.5] ✓</text>
  
  <rect x="680" y="580" width="160" height="50" rx="6" fill="#28a745" stroke="#1e7e34"/>
  <text x="760" y="602" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">GPU 3</text>
  <text x="760" y="620" font-family="Arial, sans-serif" font-size="10" fill="#ddd" text-anchor="middle">[0.4, -0.4, 0.5] ✓</text>
  
  <!-- Bottom note -->
  <text x="450" y="670" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">All GPUs now have identical gradients and can update their weights in sync</text>
</svg>
