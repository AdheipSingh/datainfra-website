<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a2e">
<style>
  text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  .title { font-size: 22px; fill: #e0e0e0; font-weight: 600; }
  .subtitle { font-size: 14px; fill: #9a9ab0; font-weight: 400; }
  .box-title { font-size: 15px; font-weight: 600; }
  .box-sub { font-size: 12px; font-weight: 400; }
  .badge-text { font-size: 13px; font-weight: 600; }
  .note { font-size: 11px; fill: #9a9ab0; }
  .legend { font-size: 12px; fill: #9a9ab0; }
  .arr { stroke: #6a6a8a; stroke-width: 1.5; }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6a6a8a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- BaaZ branding -->
<text class="title" x="60" y="50">BaaZ</text>
<text class="subtitle" x="60" y="72">GPU Infrastructure Consulting</text>
<line x1="60" y1="84" x2="200" y2="84" stroke="#3a3a5a" stroke-width="1"/>

<!-- Main title -->
<text class="title" x="600" y="50" text-anchor="middle" font-size="26">KAI Scheduler: Queue validation webhook</text>
<text class="subtitle" x="600" y="76" text-anchor="middle">Enforcing parent-child quota consistency at admission time</text>

<!-- Parent queue -->
<rect x="430" y="110" width="340" height="80" rx="10" fill="#1e2a4a" stroke="#3b6bc4" stroke-width="1"/>
<text class="box-title" x="600" y="142" text-anchor="middle" fill="#7ab3f0">parent-queue</text>
<text class="box-sub" x="600" y="164" text-anchor="middle" fill="#5a8ac0">cpu: 2000 · gpu: 2 · memory: 4096</text>

<!-- Arrow down to webhook -->
<line x1="600" y1="190" x2="600" y2="240" class="arr" marker-end="url(#arrow)"/>
<text class="note" x="612" y="220">parentQueue ref</text>

<!-- Webhook -->
<rect x="370" y="242" width="460" height="60" rx="10" fill="#2a1e40" stroke="#7f6bc4" stroke-width="1"/>
<text class="box-title" x="600" y="268" text-anchor="middle" fill="#b0a0e0">Validating admission webhook</text>
<text class="box-sub" x="600" y="286" text-anchor="middle" fill="#8a7ab0">--enable-quota-validation</text>

<!-- Left branch arrow -->
<line x1="480" y1="302" x2="320" y2="370" class="arr" marker-end="url(#arrow)"/>

<!-- Right branch arrow -->
<line x1="720" y1="302" x2="880" y2="370" class="arr" marker-end="url(#arrow)"/>

<!-- Valid child -->
<rect x="140" y="372" width="360" height="80" rx="10" fill="#1a2e2a" stroke="#1d9e75" stroke-width="1"/>
<text class="box-title" x="320" y="404" text-anchor="middle" fill="#5dcaa5">valid-child-queue</text>
<text class="box-sub" x="320" y="426" text-anchor="middle" fill="#3a8a6a">cpu: 1000 · gpu: 1 · memory: 2048</text>

<!-- Invalid child -->
<rect x="700" y="372" width="360" height="80" rx="10" fill="#2e1a1a" stroke="#e24b4a" stroke-width="1"/>
<text class="box-title" x="880" y="404" text-anchor="middle" fill="#f09595">invalid-child-queue</text>
<text class="box-sub" x="880" y="426" text-anchor="middle" fill="#c06a6a">cpu: 3000 · gpu: 1 · memory: 2048</text>

<!-- Accepted badge -->
<rect x="270" y="470" width="100" height="30" rx="15" fill="#0f3a2a" stroke="#1d9e75" stroke-width="1"/>
<text class="badge-text" x="320" y="490" text-anchor="middle" fill="#5dcaa5">Accepted</text>

<!-- Rejected badge -->
<rect x="830" y="470" width="100" height="30" rx="15" fill="#3a1a1a" stroke="#e24b4a" stroke-width="1"/>
<text class="badge-text" x="880" y="490" text-anchor="middle" fill="#f09595">Rejected</text>

<!-- Annotations -->
<text class="note" x="320" y="520" text-anchor="middle" fill="#5a9a7a">All resources within</text>
<text class="note" x="320" y="536" text-anchor="middle" fill="#5a9a7a">parent quota limits</text>

<text class="note" x="880" y="520" text-anchor="middle" fill="#c06a6a">Child cpu (3000) exceeds</text>
<text class="note" x="880" y="536" text-anchor="middle" fill="#c06a6a">parent quota (2000)</text>

<!-- Legend -->
<rect x="320" y="580" width="12" height="12" rx="3" fill="#1d9e75" opacity="0.6"/>
<text class="legend" x="338" y="591">CREATE allowed</text>
<rect x="520" y="580" width="12" height="12" rx="3" fill="#e24b4a" opacity="0.6"/>
<text class="legend" x="538" y="591">CREATE rejected</text>
<rect x="700" y="580" width="12" height="12" rx="3" fill="#7f6bc4" opacity="0.6"/>
<text class="legend" x="718" y="591">Webhook intercepts</text>

<!-- PR reference -->
<text class="note" x="1140" y="620" text-anchor="end">PR #857 · github.com/kai-scheduler/KAI-Scheduler</text>
</svg>
