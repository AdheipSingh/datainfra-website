<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrow-right" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a2e"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e" text-anchor="middle">The Network Bottleneck Formula</text>
  
  <!-- Main formula box -->
  <rect x="50" y="55" width="700" height="70" rx="8" fill="#1a1a2e"/>
  <text x="400" y="95" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">GPU Utilization = Compute ÷ (Compute + Network)</text>
  
  <!-- Two branches -->
  <!-- Left branch: Compute -->
  <line x1="200" y1="125" x2="200" y2="160" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="200" y1="160" x2="180" y2="160" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="180" y1="160" x2="180" y2="180" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow-right)"/>
  
  <!-- Right branch: Network -->
  <line x1="600" y1="125" x2="600" y2="160" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="600" y1="160" x2="620" y2="160" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="620" y1="160" x2="620" y2="180" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow-right)"/>
  
  <!-- Compute Time Box -->
  <rect x="50" y="190" width="260" height="90" rx="8" fill="#76b900" stroke="#5a8f00" stroke-width="2"/>
  <text x="180" y="220" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">Compute Time</text>
  <text x="180" y="248" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Forward Pass + Backward Pass</text>
  <text x="180" y="270" font-family="Arial, sans-serif" font-size="12" fill="#ddd" text-anchor="middle">(measured on your GPU)</text>
  
  <!-- Network Time Box -->
  <rect x="490" y="190" width="260" height="90" rx="8" fill="#dc3545" stroke="#b02a37" stroke-width="2"/>
  <text x="620" y="220" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">Network Time</text>
  <text x="620" y="248" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Gradient Size ÷ Throughput</text>
  <text x="620" y="270" font-family="Arial, sans-serif" font-size="12" fill="#fdd" text-anchor="middle">(the bottleneck)</text>
  
  <!-- Arrow down from Network -->
  <line x1="620" y1="280" x2="620" y2="310" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow-right)"/>
  
  <!-- Gradient Size breakdown -->
  <rect x="490" y="320" width="260" height="70" rx="6" fill="#fff" stroke="#dc3545" stroke-width="2"/>
  <text x="620" y="348" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc3545" text-anchor="middle">Gradient Size</text>
  <text x="620" y="372" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e" text-anchor="middle">Parameters × 4 bytes (FP32)</text>
  
  <!-- Example calculations -->
  <rect x="50" y="310" width="380" height="170" rx="8" fill="#fff" stroke="#0f3460" stroke-width="2"/>
  <text x="240" y="338" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f3460" text-anchor="middle">Example: BERT-base (440 MB gradients)</text>
  
  <!-- Example values -->
  <text x="70" y="365" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">Compute Time:</text>
  <text x="200" y="365" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#76b900">150 ms (typical)</text>
  
  <text x="70" y="390" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">Gradient Size:</text>
  <text x="200" y="390" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e">110M params × 4 bytes =</text>
  <text x="345" y="390" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">440 MB</text>
  
  <!-- 1 GbE calculation -->
  <rect x="60" y="405" width="170" height="65" rx="4" fill="#f8d7da" stroke="#dc3545"/>
  <text x="145" y="425" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc3545" text-anchor="middle">1 GbE Network</text>
  <text x="145" y="442" font-family="Arial, sans-serif" font-size="9" fill="#721c24" text-anchor="middle">440 MB ÷ 110 MB/s = 4,000 ms</text>
  <text x="145" y="460" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc3545" text-anchor="middle">GPU Util: 3.6%</text>
  
  <!-- 100 GbE calculation -->
  <rect x="250" y="405" width="170" height="65" rx="4" fill="#d4edda" stroke="#28a745"/>
  <text x="335" y="425" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#28a745" text-anchor="middle">100 GbE RDMA</text>
  <text x="335" y="442" font-family="Arial, sans-serif" font-size="9" fill="#155724" text-anchor="middle">440 MB ÷ 11,000 MB/s = 40 ms</text>
  <text x="335" y="460" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#28a745" text-anchor="middle">GPU Util: 79%</text>
  
  <!-- Rule of thumb -->
  <rect x="490" y="410" width="260" height="70" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="620" y="435" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#856404" text-anchor="middle">📌 Rule of Thumb</text>
  <text x="620" y="458" font-family="Arial, sans-serif" font-size="11" fill="#856404" text-anchor="middle">If GPU utilization is below 50%,</text>
  <text x="620" y="473" font-family="Arial, sans-serif" font-size="11" fill="#856404" text-anchor="middle">your network is the bottleneck.</text>
</svg>
