<svg width="680" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- GH200 outer container -->
<rect x="40" y="30" width="600" height="235" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="58" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">NVIDIA GH200 Grace Hopper superchip</text>
<text x="340" y="76" text-anchor="middle" font-size="12" fill="#5F5E5A">aarch64 · 72 cores · 480GB HBM3 · Ubuntu 22.04</text>

<!-- Grace CPU -->
<rect x="70" y="100" width="170" height="56" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="155" y="122" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Grace CPU (ARM)</text>
<text x="155" y="140" text-anchor="middle" font-size="12" fill="#0F6E56">72 cores</text>

<!-- H200 GPU -->
<rect x="270" y="100" width="170" height="56" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="355" y="122" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">H200 GPU</text>
<text x="355" y="140" text-anchor="middle" font-size="12" fill="#534AB7">480GB HBM3</text>

<!-- ConnectX-7 NIC -->
<rect x="70" y="190" width="370" height="56" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="255" y="212" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">ConnectX-7 dual-port · fw 28.40.1000</text>
<text x="255" y="232" text-anchor="middle" font-size="12" fill="#993C1D">enp1s0f0np0 (active) · enp1s0f1np1 (down, unused)</text>

<!-- nvidia_peermem arrow -->
<path d="M355 156 L355 190" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="370" y="178" text-anchor="start" font-size="12" fill="#7F77DD">GPUDirect</text>

<!-- PCIe arrow -->
<line x1="155" y1="156" x2="155" y2="190" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="170" y="178" text-anchor="start" font-size="12" fill="#5F5E5A">PCIe</text>

<!-- Topology box -->
<rect x="470" y="100" width="150" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="545" y="122" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Topology</text>
<text x="545" y="140" text-anchor="middle" font-size="12" fill="#5F5E5A">GPU↔NIC: NODE</text>

<!-- Single port split section -->
<rect x="100" y="300" width="480" height="56" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="322" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">enp1s0f0np0 — single physical port, two virtual paths</text>
<text x="340" y="342" text-anchor="middle" font-size="12" fill="#5F5E5A">Flannel vxlan overlay + macvlan sub-interface share the same wire</text>

<!-- Arrow from NIC to split -->
<line x1="255" y1="246" x2="255" y2="270" stroke="#5F5E5A" stroke-width="1"/>
<line x1="255" y1="270" x2="340" y2="270" stroke="#5F5E5A" stroke-width="1"/>
<line x1="340" y1="270" x2="340" y2="300" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Flannel path -->
<path d="M230 356 L230 390 L190 390 L190 440" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="160" y="405" text-anchor="middle" font-size="12" fill="#1D9E75">Flannel</text>

<!-- Macvlan path -->
<path d="M450 356 L450 390 L490 390 L490 440" fill="none" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="520" y="405" text-anchor="middle" font-size="12" fill="#D85A30">Macvlan</text>

<!-- RDMA device plugin path -->
<path d="M580 300 L610 300 L610 550 L440 550 L440 570" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="622" y="430" text-anchor="start" font-size="12" fill="#7F77DD">RDMA</text>
<text x="622" y="446" text-anchor="start" font-size="12" fill="#7F77DD">device</text>
<text x="622" y="462" text-anchor="start" font-size="12" fill="#7F77DD">plugin</text>

<!-- Kubernetes pod -->
<rect x="80" y="440" width="530" height="200" rx="20" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="345" y="468" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Kubernetes pod (rdma-test)</text>

<!-- eth0 interface -->
<rect x="110" y="490" width="210" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="215" y="512" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">eth0 (flannel)</text>
<text x="215" y="530" text-anchor="middle" font-size="12" fill="#0F6E56">10.42.0.9 · management</text>

<!-- net1 interface -->
<rect x="370" y="490" width="210" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="475" y="512" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">net1 (macvlan)</text>
<text x="475" y="530" text-anchor="middle" font-size="12" fill="#993C1D">192.168.50.2 · RDMA data</text>

<!-- /dev/infiniband -->
<rect x="170" y="570" width="340" height="32" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="590" text-anchor="middle" font-size="12" fill="#3C3489">/dev/infiniband/uverbs0 · uverbs1 · rdma_cm</text>

</svg>